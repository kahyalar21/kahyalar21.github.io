name: Update static portal and HTTP mirror

on:
  schedule:
    # Her ay 1 ve 16. gün UTC 03:10'da çalışır.
    # Türkiye saatiyle yaklaşık 06:10.
    - cron: "10 3 1,16 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate static pages
        run: python3 scripts/update.py

      - name: Commit generated files to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Fortnightly portal update"
          git push

      - name: Prepare public upload folder
        run: |
          rm -rf public_upload
          mkdir public_upload

          cp -r *.html public_upload/ 2>/dev/null || true
          cp -r *.css public_upload/ 2>/dev/null || true
          cp -r *.js public_upload/ 2>/dev/null || true
          cp -r *.txt public_upload/ 2>/dev/null || true
          cp -r *.xml public_upload/ 2>/dev/null || true

          cp -r archive public_upload/ 2>/dev/null || true
          cp -r articles public_upload/ 2>/dev/null || true
          cp -r books public_upload/ 2>/dev/null || true
          cp -r puzzles public_upload/ 2>/dev/null || true
          cp -r radio public_upload/ 2>/dev/null || true
          cp -r readings public_upload/ 2>/dev/null || true

          echo "Prepared files:"
          find public_upload -type f | sort

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Check FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          if [ -z "$FTP_SERVER" ]; then echo "FTP_SERVER is missing"; exit 1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "FTP_USERNAME is missing"; exit 1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "FTP_PASSWORD is missing"; exit 1; fi
          if [ -z "$FTP_SERVER_DIR" ]; then echo "FTP_SERVER_DIR is missing"; exit 1; fi
          echo "FTP secrets exist."
          echo "FTP_SERVER_DIR=$FTP_SERVER_DIR"

      - name: Upload HTTP mirror by FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -d -c "
          set ftp:ssl-allow no;
          set ftp:passive-mode yes;
          set net:timeout 30;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;
          open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\";
          cd \"$FTP_SERVER_DIR\";
          mirror -R --verbose public_upload/ .;
          bye
          "
