name: Update static portal and HTTP mirror

on:
  schedule:
    # Her ay 1 ve 16. gün UTC 03:10'da çalışır.
    # Türkiye saatiyle yaklaşık 06:10.
    - cron: "10 3 1,16 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate static pages
        run: python3 scripts/update.py

      - name: Commit generated files to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Fortnightly portal update"
          git push

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload HTTP mirror by FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -c "
          set ftp:ssl-allow no;
          set ftp:passive-mode yes;
          set net:timeout 30;
          set net:max-retries 3;
          open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\";
          mirror -R --delete --verbose \
            --exclude-glob .git/** \
            --exclude-glob .git* \
            --exclude-glob .github/** \
            --exclude-glob scripts/** \
            --exclude-glob data/** \
            --exclude-glob AUTOMATION.md \
            ./ \"$FTP_SERVER_DIR\";
          bye
          "
